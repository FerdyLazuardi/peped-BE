services:

  api:
    build: .
    container_name: peped-api
    # Memory ceiling (cgroup). Idle RSS ~860MB (fastembed BM25 + embed config);
    # 2G leaves room for request bursts. Prevents one runaway from OOM-ing the
    # whole 8GB box and taking down sibling services.
    mem_limit: 2g
    mem_reservation: 1g
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      QDRANT_HOST: qdrant
      QDRANT_PORT: '6333'
      # Cap BLAS/onnxruntime thread pools to the 2 available vCPUs so the
      # fastembed BM25 sparse encoder doesn't oversubscribe cores and thrash P95.
      OMP_NUM_THREADS: '2'
      MKL_NUM_THREADS: '2'
      # API pool: 8 base + 12 overflow = 20 connections max. Sized to
      # cover 24 in-flight pipelines × ~1 connection each (gather'd in
      # _prepare_rag_context fans out but most queries return in <10ms
      # so the steady-state checkout is well under the cap). Combined
      # with the worker's 10, total = 30 vs Postgres max_connections=50.
      POSTGRES_POOL_SIZE: '8'
      POSTGRES_MAX_OVERFLOW: '12'
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/.venv
      - ./logs:/app/logs
      - peped_hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1" ]

  worker:
    build: .
    container_name: peped-worker
    # Idle RSS ~370MB; background jobs (LTM sync, eval, moodle/portfolio sync)
    # are bursty but at streaq concurrency=2 two simultaneous heavy jobs (LLM
    # call + Qdrant upsert + Postgres + bge-m3 BM25 encoder) can hit ~1.1GB
    # transient — the previous 1G ceiling caused OOM-kills when 2 jobs ran
    # concurrently. 1.5G keeps two-burst headroom without overcommitting the
    # 8GB host (api+worker+postgres+redis+qdrant = ~6.1G cgroup ceiling).
    mem_limit: 1.5g
    mem_reservation: 768m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      QDRANT_HOST: qdrant
      QDRANT_PORT: '6333'
      # Cap BLAS/onnxruntime thread pools to the 2 available vCPUs. Harmless
      # guard against transitive oversubscription in sync/eval/ltm jobs.
      OMP_NUM_THREADS: '2'
      MKL_NUM_THREADS: '2'
      # Worker pool: 4 base + 6 overflow = 10 connections max. Cron
      # jobs (moodle sync, LTM sync, portfolio sync, eval) run
      # sequentially inside a single streaq worker (`concurrency=2`), so
      # 10 is plenty. Combined with the API's 20 = 30 vs
      # Postgres max_connections=50.
      POSTGRES_POOL_SIZE: '4'
      POSTGRES_MAX_OVERFLOW: '6'
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/.venv
      - ./logs:/app/logs
      - peped_hf_cache:/app/.cache/huggingface
    command: [ "streaq", "run", "app.worker:worker" ]

  postgres:
    image: postgres:16
    container_name: peped-postgres
    # Idle ~40MB; ceiling covers shared_buffers + up to 30 pooled connections.
    mem_limit: 768m
    mem_reservation: 256m
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
    environment:
      POSTGRES_DB: lms_ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - peped_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d lms_ai" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3-alpine
    container_name: peped-redis
    # maxmemory 768m (set in command) + process overhead. Ceiling slightly above
    # so the cgroup limit never fires before redis's own LRU eviction does.
    # io-threads is left at the server default (1) — the 2-vCPU box this runs
    # on would gain nothing from threading I/O, and the default avoids the
    # extra threads eating into the cgroup's CPU share.
    # 768mb (was 512mb): at 600 DAU the 50k cap semantic_cache + per-conv
    # HASHes + LTM locks + streaq stream + agent_log buffer head toward
    # 400-450MB under burst, leaving only ~60MB headroom at 512mb. 768mb
    # gives ~300MB headroom for the same load at 13k DAU.
    mem_limit: 1g
    mem_reservation: 256m
    # volatile-lru (NOT allkeys-lru): this single Redis is shared by the query
    # cache, conversation history, the streaq job QUEUE, rate-limit counters, and
    # the agent_log buffer. allkeys-lru would evict ANY key under memory
    # pressure — including queued LTM/eval jobs and the log buffer, which carry
    # NO TTL — silently dropping scheduled work. volatile-lru only evicts keys
    # that have an explicit TTL (cache/history/rate-limit), so the untled queue
    # + buffer are never sacrificed to make room for cache growth.
    # --maxmemory-samples 10: Redis 8.0+ raised the LRU sample size default to
    # 10 for better eviction fidelity; cost is negligible vs. default 5.
    command: ["redis-server", "--maxmemory", "768mb", "--maxmemory-policy", "volatile-lru", "--maxmemory-samples", "10"]
    ports:
      - "6381:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: peped-qdrant
    # Idle ~120MB at 42 KB chunks. Ceiling sized for growth: ~300 KB chunks +
    # up to ~650k LTM vectors (HNSW graph stays in RAM even with on_disk payload).
    mem_limit: 1500m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - peped_qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  peped_postgres_data:
  peped_qdrant_storage:
  peped_hf_cache:
