services:

  api:
    build: .
    container_name: peped-api
    # Memory ceiling (cgroup). Idle RSS ~860MB (fastembed BM25 + embed config);
    # 2G leaves room for request bursts. Prevents one runaway from OOM-ing the
    # whole 8GB box and taking down sibling services.
    mem_limit: 2g
    mem_reservation: 1g
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      QDRANT_HOST: qdrant
      QDRANT_PORT: '6333'
      # Cap BLAS/onnxruntime thread pools to the 2 available vCPUs so the
      # fastembed BM25 sparse encoder doesn't oversubscribe cores and thrash P95.
      OMP_NUM_THREADS: '2'
      MKL_NUM_THREADS: '2'
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/.venv
      - ./logs:/app/logs
      - peped_hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1" ]

  worker:
    build: .
    container_name: peped-worker
    # Idle RSS ~370MB; background jobs (LTM sync, eval, moodle/portfolio sync)
    # are bursty but short. 1G is a safe ceiling.
    mem_limit: 1g
    mem_reservation: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      QDRANT_HOST: qdrant
      QDRANT_PORT: '6333'
      # Cap BLAS/onnxruntime thread pools to the 2 available vCPUs. Harmless
      # guard against transitive oversubscription in sync/eval/ltm jobs.
      OMP_NUM_THREADS: '2'
      MKL_NUM_THREADS: '2'
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/.venv
      - ./logs:/app/logs
      - peped_hf_cache:/app/.cache/huggingface
    command: [ "arq", "app.worker.WorkerSettings" ]

  postgres:
    image: postgres:16
    container_name: peped-postgres
    # Idle ~40MB; ceiling covers shared_buffers + up to 30 pooled connections.
    mem_limit: 768m
    mem_reservation: 256m
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
    environment:
      POSTGRES_DB: lms_ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - peped_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d lms_ai" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: peped-redis
    # maxmemory 512m (set in command) + process overhead. Ceiling slightly above
    # so the cgroup limit never fires before redis's own LRU eviction does.
    mem_limit: 768m
    mem_reservation: 128m
    # volatile-lru (NOT allkeys-lru): this single Redis is shared by the query
    # cache, conversation history, the arq job QUEUE, rate-limit counters, and
    # the agent_log buffer. allkeys-lru would evict ANY key under memory
    # pressure — including queued LTM/eval jobs and the log buffer, which carry
    # NO TTL — silently dropping scheduled work. volatile-lru only evicts keys
    # that have an explicit TTL (cache/history/rate-limit), so the untled queue
    # + buffer are never sacrificed to make room for cache growth.
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "6381:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: peped-qdrant
    # Idle ~120MB at 42 KB chunks. Ceiling sized for growth: ~300 KB chunks +
    # up to ~650k LTM vectors (HNSW graph stays in RAM even with on_disk payload).
    mem_limit: 1500m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - peped_qdrant_storage:/qdrant/storage
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: peped-phoenix
    # Debug-only (opt-in profile). Idle ~445MB; ceiling keeps it bounded when run.
    mem_limit: 768m
    mem_reservation: 256m
    # Opt-in only: `docker compose --profile debug up`. The app tolerates
    # Phoenix being down (setup_phoenix is wrapped in try/except); api/worker
    # only set PHOENIX_* env vars, so they start fine without this service.
    profiles: ["debug"]
    ports:
      - "6006:6006"  # Phoenix UI + REST
      - "4317:4317"  # OTLP gRPC
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - peped_phoenix_data:/mnt/data
    restart: unless-stopped

volumes:
  peped_postgres_data:
  peped_qdrant_storage:
  peped_phoenix_data:
  peped_hf_cache:
