# NOTE: deliberately NOT listing bare "topik", "materi", "pelajaran", "kursus",
# "apa aja", "apa saja" — they're too greedy. As substrings they'd wrongly match
# content questions like "value amartha apa aja" (which should be KNOWLEDGE).
# The specific compound phrases above (e.g., "topik apa aja", "materi apa saja")
# are sufficient; the END-anchored regex below catches "belajar apa" at EOM.
