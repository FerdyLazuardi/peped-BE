# ─────────────────────────────────────────────────────────────────────────────
# INTENT PATTERNS — rule-based gating (loaded by app/graph/intent_rules.py)
# ─────────────────────────────────────────────────────────────────────────────
# This file is the "negative/keyword" layer: substring + regex patterns used
# for fast rule-based gating BEFORE any embedding similarity runs.
#
#   • off_scope_keywords      — substring trip-wires; if any matches, route to
#                                OFF_SCOPE without calling the LLM/centroid.
#   • identity_phrases        — user asking WHO Ava is → GREETING (not TOPIC_LIST).
#   • greeting_prefix_pattern — anchor regex for "halo|hai|pagi|…" prefixes.
#   • greeting_words / thanks_tokens / thanks_fluff — token lists used by
#                                rules.py to identify chit-chat turns after
#                                stripping filler ("halo kaa", "makasih ya").
#   • topic_list_phrases      — full-phrase trip-wires for "ada topik apa".
#   • topic_list_regex        — EOM-anchored regex ("belajar apa" at end).
#
# KEPT SEPARATE FROM intent_seed.yaml ON PURPOSE:
#   • intent_seed.yaml  = full UTTERANCES per intent → used by
#     intent_classifier.py for embedding similarity (training centroids).
#   • intent_patterns.yaml = KEYWORDS / REGEX → used by intent_rules.py
#     for cheap pre-filtering.
#   Different shapes, different consumers, different lifecycles — merging them
#   would force one consumer to load data the other doesn't need.
# ─────────────────────────────────────────────────────────────────────────────

