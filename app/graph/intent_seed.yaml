COACHING:
  # Diagnostic — user asking WHY something in their own work is happening.
  # These are the turns worth thinking through Socratically (button-driven).
  - "kok mitra aku susah ditagih ya"
  - "kenapa nasabah aku banyak yang nunggak"
  - "kok target aku bulan ini ga kecapai"
  - "kenapa ya mitra aku pada kabur"
  - "kok susah banget dapat nasabah baru"
  - "kenapa pencairan aku sering ditolak"
  # Reasoning / how-should-I — open-ended approach questions about their work
  - "gimana caranya aku ningkatin repayment rate"
  - "gimana aku ngeyakinin mitra yang ragu"
  - "menurut kamu gimana cara aku handle nasabah nakal"
  - "gimana strategi nagih yang baik"
  - "aku harus mulai dari mana buat bangun kepercayaan nasabah"
  - "gimana caranya aku jelasin produk ke mitra yang gaptek"
  # Explicit coaching / think-with-me requests
  - "ajak aku mikir dong soal ini"
  - "bantu aku analisa kenapa ini bisa terjadi"
  - "aku pengen ngerti akar masalahnya"

