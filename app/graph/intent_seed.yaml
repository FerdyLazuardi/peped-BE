# Intent seed examples for the Tier-0 semantic gate.
#
# This file provides the SEMANTIC ANCHORS that the embedding-based
# classifier in app/graph/intent_classifier.py uses to compute intent
# centroids. It is NOT a regex pattern list — adding a new example here
# automatically extends the classifier's coverage through embedding
# similarity, without any code change.
#
# ── BOOTSTRAP DATA ───────────────────────────────────────────────────────────
# This is a hand-curated starter set that spans diverse languages,
# registers, and cultural contexts (Indonesian casual + formal, English,
# religious greetings across Islam / Kristen / Buddha / Hindu, time-based,
# identity questions, typo/elongation variants). It is intentionally
# small to keep centroid computation fast at first boot.
#
# When production traffic is available (≥ 30 labelled queries per intent
# class), recompute centroids from real data — the embedding model
# generalises better from real distribution than from a curated set.
#
# TO REFRESH:
#   1. Export intent-labelled queries from agent_logs (column: intent) or
#      the eval set.
#   2. Group by intent, take a representative sample (30+ per intent).
#   3. Replace the lists below and restart — fingerprint-based cache
#      invalidation in intent_classifier.py handles the rest.
#   4. Or run scripts/recompute_intent_centroids.py (TODO if not yet
#      present) to materialise a new YAML from a Postgres query.
#
# ── COVERAGE NOTES ───────────────────────────────────────────────────────────
# * Greetings intentionally include religious / regional variants that
#   the regex Tier-1 cannot keep up with at 13k-user scale (assalam*,
#   shalom, om swastiastu, namaste, tabik, etc.). The classifier learns
#   these from the embeddings — no language-specific code added.
# * AMBIGUOUS examples are kept DISTINCT from GREETING (e.g. "halo"
#   only appears in GREETING). Short queries like "halo" have high
#   similarity to both, but the margin threshold breaks the tie safely.
# * KNOWLEDGE seeds use ONLY Amartha-relevant topics so the centroid
#   stays in-domain; off-scope topics live under OFF_SCOPE so the
#   gate doesn't accidentally route "harga bitcoin" to KNOWLEDGE.
# * COACHING seeds are diagnostic / reasoning questions about the user's
#   OWN situation ("kok mitra aku susah ditagih", "kenapa target aku ga
#   kecapai") — the kind worth thinking through Socratically. NOTE: COACHING
#   is BUTTON-driven (ChatRequest.coaching_mode), NOT auto-routed by this gate.
#   These seeds also power the auto-hook that OFFERS coaching after a normal
#   answer — they must NOT be used to silently route a user into Socratic mode
#   without opt-in.

GREETING:
  # Casual Indonesian
  - "halo"
  - "hai"
  - "hei"
  - "hi"
  - "hey"
  - "halo semua"
  - "hai kak"
  - "pagi"
  - "siang"
  - "sore"
  - "malam"
  - "selamat pagi"
  - "selamat siang"
  - "selamat sore"
  - "selamat malam"
  - "permisi"
  - "test"
  - "tes"
  - "testing"
  - "halo ada yang bisa bantu"
  # Casual English
  - "hello"
  - "good morning"
  - "good afternoon"
  - "good evening"
  - "good night"
  - "excuse me"
  # Religious / cultural greetings — these are the variants that
  # historically fell through the regex and cost the full 2.7K-token
  # LLM pre-processor call. The semantic gate now handles them via
  # embedding similarity to the casual greetings above.
  - "assalamualaikum"
  - "assalamu alaikum warahmatullahi wabarakatuh"
  - "waalaikumsalam"
  - "waalaykumussalam warahmatullahi wabarakatuh"
  - "shalom"
  - "shalom aleichem"
  - "om swastiastu"
  - "om santih santih santih"
  - "namaste"
  - "namo buddaya"
  - "salam sejahtera"
  - "salam damai"
  - "tabik"
  - "tabik pun"
  # Elongation / typos — the regex tier does not catch these;
  # embeddings naturally place them near the canonical form.
  - "halooo"
  - "haiiii"
  - "hallow"
  - "helloo"
  - "pagi semua"
  # Identity / app-purpose — also routed to GREETING by graph
  - "kamu siapa"
  - "lu siapa"
  - "lo siapa"
  - "kamu bot apa"
  - "ini aplikasi apa"
  - "ini apps buat apa"
  - "perkenalkan diri kamu"
  - "who are you"
  - "what are you"
  - "what is this app"
  - "introduce yourself"
  - "what can you do"

