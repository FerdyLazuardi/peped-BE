<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amartha AI LMS | Agentic RAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-deep: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-vibrant: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            color: var(--text-vibrant);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .app-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .app-wrapper::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--primary));
            z-index: -1;
            border-radius: 26px;
            opacity: 0.15;
            filter: blur(5px);
        }

        /* Header */
        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        /* Chat Area */
        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-feed::-webkit-scrollbar {
            width: 6px;
        }

        .chat-feed::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        .ai-bubble {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .msg-info {
            font-size: 0.7rem;
            margin-top: 8px;
            color: var(--text-dim);
            display: flex;
            gap: 12px;
        }

        /* Input Area */
        .input-section {
            padding: 32px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--glass-border);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .input-box {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .input-box:focus-within {
            border-color: var(--primary);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button.send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px 0 var(--primary-glow);
        }

        button.send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            width: fit-content;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .sources-tag {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: help;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="header">
            <div class="logo-area">
                <h1>Amartha AI LMS</h1>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                Agent Active
            </div>
        </header>

        <main class="chat-feed" id="chatFeed">
            <div class="msg-bubble ai-bubble">
                Welcome to the Amartha Intelligent LMS. I'm a dynamic RAG agent powered by LangGraph. 
                Ask me anything about microfinance, Indonesia, or Amartha's internal knowledge.
            </div>
        </main>

        <section class="input-section">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Type your inquiry here..." autocomplete="off">
                <button class="send-btn" id="sendBtn">Engage</button>
            </div>
        </section>
    </div>

    <script>
        const chatFeed = document.getElementById('chatFeed');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let conversationId = null;

        function addMessage(role, text, meta) {
            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${role}-bubble`;
            
            // Basic line break support
            let content = text.replace(/\n/g, '<br>');
            
            bubble.innerHTML = `
                <div>${content}</div>
                ${meta ? `<div class="msg-info"><span>${meta}</span></div>` : ''}
            `;
            
            chatFeed.appendChild(bubble);
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        async function handleSend() {
            const query = userInput.value.trim();
            if (!query) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            addMessage('user', query);

            // Typing indicator
            const loading = document.createElement('div');
            loading.className = 'typing-indicator';
            loading.id = 'loading';
            loading.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatFeed.appendChild(loading);
            chatFeed.scrollTop = chatFeed.scrollHeight;

            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, conversation_id: conversationId })
                });
                
                const data = await response.json();
                if (data.conversation_id) conversationId = data.conversation_id;

                document.getElementById('loading').remove();
                
                let meta = `Latency: ${data.latency_ms}ms`;
                if (data.cached) meta += ' | ⚡ Cached';
                
                addMessage('ai', data.answer, meta);

            } catch (e) {
                if (document.getElementById('loading')) document.getElementById('loading').remove();
                addMessage('ai', 'Error: Failed to reach the backend. Check console logs.');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
