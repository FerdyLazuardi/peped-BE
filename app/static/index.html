<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ava </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <button id="chat-toggle">
        <i id="chat-icon" class="fas fa-comment-dots"></i>
        <span id="chat-badge">1</span>
    </button>

    <div id="chat-box" class="animate__animated">
        <div id="chat-header">
            <div class="header-info">
                <div class="online-dot"></div>
                <div style="display:flex; flex-direction:column;">
                    <span>Ava</span>
                    <small style="font-size:11px; opacity:.8;">Biasanya membalas &lt; 1 menit</small>
                </div>
            </div>
            <div style="display:flex; gap:22px; align-items:center;">
                <i class="fas fa-trash-alt header-icon" onclick="clearChat()" title="Clear chat"
                    style="cursor:pointer; font-size:14px; opacity:0.8;"></i>
                <i class="fas fa-times header-icon" onclick="toggleChat()" title="Close chat"
                    style="cursor:pointer; font-size:14px; opacity:0.8;"></i>
            </div>
        </div>

        <div id="chat-messages"></div>

        <div id="chat-input">
            <textarea id="prompt" rows="1" placeholder="Ketik pesan..." onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" onclick="handleSendClick()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>

</html>
